<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>nudge.</title>
<link rel="manifest" href="#" id="manifest-link">
<meta name="theme-color" content="#1A1F36">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F0F4FF;
    --surface: #FFFFFF;
    --primary: #4A6CF7;
    --secondary: #B8C8FF;
    --danger: #F07070;
    --warning: #F5C26B;
    --success: #5FBF8F;
    --text-primary: #1A1F36;
    --text-secondary: #6B7280;
    --marquee-bg: #1A1F36;
    --marquee-text: #F0F4FF;
    --border: #E2E8F0;
    --font-body: 'Plus Jakarta Sans', sans-serif;
    --font-display: 'Fraunces', serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    overscroll-behavior: none;
  }

  #app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── MARQUEE ── */
  .marquee-bar {
    background: var(--marquee-bg);
    color: var(--marquee-text);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 0;
    overflow: hidden;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .marquee-inner {
    display: inline-block;
    animation: marquee 22s linear infinite;
  }
  .marquee-inner span { margin: 0 40px; }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px 8px;
    background: none;
    border: none;
    cursor: pointer;
    gap: 3px;
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 500;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--primary); }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; }

  /* ── SCROLL CONTENT ── */
  .view-content {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 80px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin: 0 16px 12px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    margin: 20px 16px 12px;
  }

  /* ── BADGES ── */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .badge-safe { background: #DFFAEE; color: var(--success); }
  .badge-warning { background: #FEF9EC; color: #C69A00; }
  .badge-danger { background: #FEECEC; color: var(--danger); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); opacity: 0.9; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-secondary { background: var(--secondary); color: var(--primary); }
  .btn-danger { background: #FEECEC; color: var(--danger); }
  .btn-full { width: 100%; }

  /* ── INPUT ── */
  .input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--text-primary);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
  }
  .input:focus { border-color: var(--primary); }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group { margin-bottom: 18px; }

  /* ── BUTTON GROUP SELECT ── */
  .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .btn-group-item {
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-group-item.selected {
    border-color: var(--primary);
    background: #EEF1FF;
    color: var(--primary);
  }

  /* ── TOGGLE ── */
  .toggle-wrap { display: flex; align-items: center; gap: 12px; }
  .toggle {
    position: relative;
    width: 44px;
    height: 26px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 100px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-slider::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--primary); }
  .toggle input:checked + .toggle-slider::after { transform: translateX(18px); }

  /* ── ONBOARDING ── */
  #onboarding {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    overflow-y: auto;
  }
  .onboard-header {
    padding: 48px 24px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .onboard-logo {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 900;
    color: var(--primary);
    margin-bottom: 8px;
  }
  .onboard-tagline {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .progress-bar-wrap {
    display: flex;
    gap: 6px;
    margin-top: 20px;
  }
  .progress-seg {
    height: 4px;
    flex: 1;
    border-radius: 100px;
    background: var(--border);
    transition: background 0.3s;
  }
  .progress-seg.active { background: var(--primary); }
  .onboard-body { padding: 24px; flex: 1; }
  .onboard-step-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .onboard-step-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 28px;
  }

  /* ── SUBJECT ROW IN ONBOARDING ── */
  .subject-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .subject-row-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .subject-row-meta {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .subject-add-form {
    background: #F8FAFF;
    border: 1.5px dashed var(--secondary);
    border-radius: 12px;
    padding: 16px;
    margin-top: 12px;
  }

  /* ── DAY CHECKBOX ── */
  .day-checks { display: flex; gap: 6px; flex-wrap: wrap; }
  .day-check-label {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
    user-select: none;
  }
  .day-check-label input { display: none; }
  .day-check-label.checked { border-color: var(--primary); background: #EEF1FF; color: var(--primary); }

  /* ── MAIN APP ── */
  #main-app { display: none; flex-direction: column; min-height: 100vh; }

  /* ── DASHBOARD ── */
  .dash-greeting {
    padding: 20px 16px 0;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .dash-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .dash-roast {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 15px;
    color: var(--text-secondary);
    margin: 4px 16px 0;
    line-height: 1.4;
  }
  .dash-big-pct {
    text-align: center;
    padding: 28px 16px 8px;
  }
  .dash-pct-num {
    font-family: var(--font-display);
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
  }
  .dash-pct-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 600;
    margin-top: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── TODAY CLASSES ── */
  .today-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin: 0 16px 10px;
    overflow: hidden;
  }
  .today-card-header {
    padding: 14px 16px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .today-card-name { font-weight: 700; font-size: 16px; }
  .today-card-pct { font-size: 13px; color: var(--text-secondary); font-weight: 600; }
  .today-card-actions {
    display: flex;
    border-top: 1px solid var(--border);
  }
  .log-btn {
    flex: 1;
    padding: 12px 6px;
    border: none;
    background: none;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    color: var(--text-secondary);
  }
  .log-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .log-btn.active-present { background: #DFFAEE; color: var(--success); }
  .log-btn.active-absent { background: #FEECEC; color: var(--danger); }
  .log-btn.active-cancelled { background: #FEF9EC; color: #C69A00; }
  .log-btn:active { opacity: 0.7; }

  .summary-line {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: center;
    padding: 4px 16px 16px;
  }

  /* ── SUBJECTS VIEW ── */
  .subject-card {
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .subject-card.expanded { border-color: var(--primary); }
  .subject-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .subject-card-name { font-weight: 700; font-size: 16px; }
  .subject-card-pct {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
  }
  .subject-card-counts {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-top: 2px;
  }
  .subject-card-expand { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
  .expand-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
  .expand-label { color: var(--text-secondary); font-weight: 500; }
  .expand-val { font-weight: 700; }
  .log-history { margin-top: 10px; }
  .log-dot-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .log-dot {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }
  .log-dot-P { background: #DFFAEE; color: var(--success); }
  .log-dot-A { background: #FEECEC; color: var(--danger); }
  .log-dot-C { background: #FEF9EC; color: #C69A00; }

  /* ── CALENDAR ── */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 8px;
  }
  .cal-nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 34px; height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-primary);
  }
  .cal-month-label {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
  }
  .cal-grid-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0 16px;
    gap: 2px;
  }
  .cal-day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    padding: 4px 0;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    padding: 6px 16px 12px;
  }
  .cal-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color 0.15s;
    position: relative;
  }
  .cal-cell.empty { cursor: default; }
  .cal-cell.today-cell { border-color: var(--primary); }
  .cal-cell.has-classes-good { background: #DFFAEE; color: var(--success); }
  .cal-cell.has-classes-warn { background: #FEF9EC; color: #C69A00; }
  .cal-cell.has-classes-bad { background: #FEECEC; color: var(--danger); }
  .cal-cell.no-classes { background: var(--surface); color: var(--text-secondary); }
  .cal-cell.future { background: transparent; color: var(--text-secondary); opacity: 0.5; }
  .cal-day-detail {
    margin: 0 16px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .streak-banner {
    margin: 8px 16px 0;
    background: var(--text-primary);
    color: var(--bg);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── BUNK PLANNER ── */
  .planner-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin: 0 16px 10px;
    overflow: hidden;
  }
  .planner-day-header {
    background: var(--bg);
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .planner-class-row {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }
  .planner-class-name { font-weight: 600; font-size: 15px; }
  .planner-class-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .skip-tag {
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
  }
  .skip-safe { background: #DFFAEE; color: var(--success); }
  .skip-risky { background: #FEF9EC; color: #C69A00; }
  .skip-no { background: #FEECEC; color: var(--danger); }
  .skip-planning { background: var(--text-primary); color: var(--bg); }

  /* ── SETTINGS ── */
  .reset-zone { margin: 24px 16px 8px; }
  .share-card-box {
    margin: 0 16px;
    background: var(--text-primary);
    border-radius: 16px;
    padding: 24px;
    color: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .share-card-pct {
    font-family: var(--font-display);
    font-size: 56px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 4px;
  }
  .share-card-roast {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 16px;
  }
  .share-card-name { font-weight: 700; font-size: 16px; }
  .share-card-brand {
    position: absolute;
    bottom: 16px; right: 20px;
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 900;
    color: var(--primary);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
  }
  .empty-state-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,31,54,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px;
    width: 100%;
    max-width: 430px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 100px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  /* ── UTILITY ── */
  .text-success { color: var(--success); }
  .text-warning { color: #C69A00; }
  .text-danger { color: var(--danger); }
  .text-secondary { color: var(--text-secondary); }
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }
  .hidden { display: none !important; }

  .divider { height: 1px; background: var(--border); margin: 4px 0 16px; }

  /* planner impact line */
  .impact-line {
    font-size: 12px;
    color: var(--text-secondary);
    font-style: italic;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
  }

  /* Edit log btns inside modal */
  .edit-log-btn {
    flex: 1;
    padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: none;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .edit-log-btn.sel-P { border-color: var(--success); background: #DFFAEE; color: var(--success); }
  .edit-log-btn.sel-A { border-color: var(--danger); background: #FEECEC; color: var(--danger); }
  .edit-log-btn.sel-C { border-color: #C69A00; background: #FEF9EC; color: #C69A00; }
  .edit-log-btn.sel-none { border-color: var(--border); background: none; color: var(--text-secondary); }

  @media (max-width: 375px) {
    .dash-pct-num { font-size: 60px; }
    .subject-card-pct { font-size: 24px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════════ ONBOARDING ═══════════════════════════════ -->
  <div id="onboarding">
    <div class="onboard-header">
      <div class="onboard-logo">nudge.</div>
      <div class="onboard-tagline">Log karo. Chill karo.</div>
      <div class="progress-bar-wrap">
        <div class="progress-seg active" id="prog0"></div>
        <div class="progress-seg" id="prog1"></div>
      </div>
    </div>
    <div class="onboard-body" id="onboard-body"></div>
  </div>

  <!-- ═══════════════════════════════ MAIN APP ═══════════════════════════════ -->
  <div id="main-app">
    <!-- Marquee -->
    <div class="marquee-bar">
      <div class="marquee-inner" id="marquee-inner"></div>
    </div>

    <!-- View Container -->
    <div class="view-content" id="view-container"></div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" onclick="switchView(0)" id="nav0">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>

<script>
// ═══════════════════════════════════════════════════
//  STATE & STORAGE
// ═══════════════════════════════════════════════════
let state = {
  profile: null,   // name, college, city, stream, semester, startDate, endDate, threshold, condonation, strictness, commute
  subjects: [],    // {id, name, days:[], lecturesPerWeek}
  logs: {},        // { 'YYYY-MM-DD': { subjectId: 'P'|'A'|'C' } }
  plannerSkips: {} // { 'YYYY-MM-DD': [subjectId,...] }
};

function saveState() { localStorage.setItem('nudge_v1', JSON.stringify(state)); }
function loadState() {
  const raw = localStorage.getItem('nudge_v1');
  if (raw) { try { state = JSON.parse(raw); } catch(e) { state = { profile:null, subjects:[], logs:{}, plannerSkips:{} }; } }
  if (!state.logs) state.logs = {};
  if (!state.plannerSkips) state.plannerSkips = {};
}

// ═══════════════════════════════════════════════════
//  DATE HELPERS
// ═══════════════════════════════════════════════════
function today() { return fmtDate(new Date()); }
function fmtDate(d) { return d.toISOString().split('T')[0]; }
function parseDate(s) { const [y,m,d] = s.split('-'); return new Date(+y,+m-1,+d); }
function dayOfWeek(dateStr) { // 0=Sun,1=Mon,...
  return parseDate(dateStr).getDay();
}
const DAY_MAP = { Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6, Sun:0 };
const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function weeksBetween(start, end) {
  const ms = parseDate(end) - parseDate(start);
  return Math.max(1, Math.round(ms / (7*24*3600*1000)));
}

function datesInRange(start, end) {
  const dates = [];
  const s = parseDate(start), e = parseDate(end);
  const cur = new Date(s);
  while(cur <= e) { dates.push(fmtDate(cur)); cur.setDate(cur.getDate()+1); }
  return dates;
}

// ═══════════════════════════════════════════════════
//  CALCULATIONS
// ═══════════════════════════════════════════════════
function getSubjectStats(subject) {
  const logs = state.logs;
  let attended = 0, held = 0;
  const allDates = state.profile ? datesInRange(state.profile.startDate, state.profile.endDate) : [];
  const history = [];
  for (const dateStr of allDates) {
    if (dateStr > today()) continue;
    const dow = parseDate(dateStr).getDay();
    if (!subject.days.includes(dow)) continue;
    const log = logs[dateStr]?.[subject.id];
    if (log === 'P') { attended++; held++; history.push({date:dateStr, status:'P'}); }
    else if (log === 'A') { held++; history.push({date:dateStr, status:'A'}); }
    else if (log === 'C') { history.push({date:dateStr, status:'C'}); }
    // unlogged: count as held+absent if date has passed
    else { held++; attended--; attended = Math.max(0, attended+1); held--; }
    // Actually only count if explicitly logged
  }
  // Re-do: only count explicitly logged
  attended = 0; held = 0;
  const histFinal = [];
  for (const dateStr of allDates) {
    if (dateStr > today()) continue;
    const dow = parseDate(dateStr).getDay();
    if (!subject.days.includes(dow)) continue;
    const log = logs[dateStr]?.[subject.id];
    if (log === 'P') { attended++; held++; histFinal.push({date:dateStr, status:'P'}); }
    else if (log === 'A') { held++; histFinal.push({date:dateStr, status:'A'}); }
    else if (log === 'C') { histFinal.push({date:dateStr, status:'C'}); }
    // Unlogged scheduled class counts as held but not attended (absent by default)
    else { held++; histFinal.push({date:dateStr, status:'?'}); }
  }
  const pct = held > 0 ? Math.round((attended/held)*100) : null;
  const threshold = state.profile?.threshold || 75;
  let bunkBudget = 0, recovery = 0;
  if (held > 0) {
    // bunk budget: how many more can be missed keeping pct >= threshold
    // solve (attended)/(held+n) >= threshold/100 => n <= attended*100/threshold - held
    bunkBudget = Math.max(0, Math.floor(attended * 100 / threshold - held));
    // recovery: if below threshold, need (attended+n)/(held+n) >= threshold/100
    // n(1-threshold/100) >= threshold/100*held - attended
    // n >= (threshold/100*held - attended)/(1 - threshold/100)
    if (pct !== null && pct < threshold) {
      const t = threshold/100;
      recovery = Math.ceil((t*held - attended)/(1-t));
    }
  }
  const status = pct === null ? 'unknown' : pct >= threshold ? 'safe' : pct >= threshold - 10 ? 'warning' : 'danger';
  return { attended, held, pct, bunkBudget, recovery, status, history: histFinal.slice(-20) };
}

function getOverallPct() {
  if (!state.subjects.length) return null;
  let totAtt = 0, totHeld = 0;
  for (const s of state.subjects) {
    const { attended, held } = getSubjectStats(s);
    totAtt += attended; totHeld += held;
  }
  return totHeld > 0 ? Math.round((totAtt/totHeld)*100) : null;
}

function getOverallSummary() {
  // Total bunk budget across all subjects (min bunk budget = limiting factor)
  if (!state.subjects.length) return null;
  const threshold = state.profile?.threshold || 75;
  let totAtt = 0, totHeld = 0;
  for (const s of state.subjects) {
    const { attended, held } = getSubjectStats(s);
    totAtt += attended; totHeld += held;
  }
  const pct = totHeld > 0 ? Math.round((totAtt/totHeld)*100) : null;
  if (pct === null) return null;
  if (pct >= threshold) {
    const budget = Math.floor(totAtt * 100/threshold - totHeld);
    return `You can skip ${budget} more class${budget===1?'':'es'} across all subjects.`;
  } else {
    const t = threshold/100;
    const recovery = Math.ceil((t*totHeld - totAtt)/(1-t));
    return `Attend ${recovery} more class${recovery===1?'':'es'} to reach ${threshold}%.`;
  }
}

// ═══════════════════════════════════════════════════
//  ROAST MESSAGES
// ═══════════════════════════════════════════════════
const ROASTS = {
  '90-100': [
    "Your professor knows your name, your face, and probably your dad's number too.",
    "First bench energy. We respect it, we fear it."
  ],
  '75-89': [
    "Safe. But don't get cocky, one sick week and you're cooked.",
    "Attendance is fine. Life choices, debatable."
  ],
  '65-74': [
    "Yaar, seriously. One more absence and the college calls home.",
    "You're not failing, you're just aggressively testing the system."
  ],
  '50-64': [
    "Your professor has genuinely forgotten what you look like.",
    "At this point your seat knows you better than your teacher does."
  ],
  'below50': [
    "You are paying fees to fund a college you have never visited.",
    "Bhai. Just. Come. To. Class."
  ],
  'exact75': [
    "One class away from disaster. Living life on hard mode, respect.",
    "75% exactly. You planned this, didn't you."
  ]
};

function getRoast(pct) {
  if (pct === null) return "Data nahi hai. Log karo pehle.";
  let bucket;
  const threshold = state.profile?.threshold || 75;
  if (pct === threshold && threshold === 75) bucket = 'exact75';
  else if (pct >= 90) bucket = '90-100';
  else if (pct >= 75) bucket = '75-89';
  else if (pct >= 65) bucket = '65-74';
  else if (pct >= 50) bucket = '50-64';
  else bucket = 'below50';
  const arr = ROASTS[bucket];
  return arr[Math.floor(Math.random()*arr.length)];
}

let _sessionRoast = null;
function getSessionRoast() {
  if (!_sessionRoast) _sessionRoast = getRoast(getOverallPct());
  return _sessionRoast;
}

// ═══════════════════════════════════════════════════
//  ONBOARDING
// ═══════════════════════════════════════════════════
let ob = { step: 0, profile: {}, subjects: [], addingSubject: false };

const STREAMS = ['Engineering','Arts','Science','Commerce','Law','Medical'];
const COMMUTES = ['Local train','College bus','City bus','Auto','Own vehicle','Don\'t commute'];

function renderOnboarding() {
  document.getElementById('onboarding').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('prog0').classList.toggle('active', ob.step >= 0);
  document.getElementById('prog1').classList.toggle('active', ob.step >= 1);
  if (ob.step === 0) renderStep1();
  else renderStep2();
}

function renderStep1() {
  const maxSem = ob.profile.stream === 'Engineering' ? 8 : 6;
  const sems = Array.from({length: maxSem}, (_,i) => i+1);
  const thresholds = ['75%','80%','85%','Custom'];
  const strictness = ['Strictly enforced','Moderate','Relaxed'];

  const commuteSelected = ob.profile.commute || [];
  const semSelected = ob.profile.semester;
  const streamSelected = ob.profile.stream;
  const threshSelected = ob.profile.thresholdType;
  const strictSelected = ob.profile.strictness;

  document.getElementById('onboard-body').innerHTML = `
    <div class="onboard-step-title">Pehle, apne baare mein batao</div>
    <div class="onboard-step-sub">Yeh sab sirf tumhare liye hai. Koi nahi dekhta.</div>

    <div class="form-group">
      <label class="form-label">Apna naam batao</label>
      <input class="input" id="ob-name" placeholder="e.g. Ananya" value="${ob.profile.name||''}">
    </div>
    <div class="form-group">
      <label class="form-label">Kaunsa college?</label>
      <input class="input" id="ob-college" placeholder="College ka naam" value="${ob.profile.college||''}">
    </div>
    <div class="form-group">
      <label class="form-label">Kaunsa city?</label>
      <input class="input" id="ob-city" placeholder="Mumbai, Pune, Delhi..." value="${ob.profile.city||''}">
    </div>

    <div class="form-group">
      <label class="form-label">Stream kya hai?</label>
      <div class="btn-group" id="stream-group">
        ${STREAMS.map(s=>`<button class="btn-group-item ${streamSelected===s?'selected':''}" onclick="selectStream('${s}')">${s}</button>`).join('')}
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Kaun sa semester?</label>
      <div class="btn-group" id="sem-group">
        ${sems.map(s=>`<button class="btn-group-item ${semSelected===s?'selected':''}" onclick="selectSem(${s})">${s}</button>`).join('')}
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Semester kab shuru hua?</label>
      <input class="input" type="date" id="ob-start" value="${ob.profile.startDate||''}">
    </div>
    <div class="form-group">
      <label class="form-label">Semester kab khatam hoga?</label>
      <input class="input" type="date" id="ob-end" value="${ob.profile.endDate||''}">
    </div>

    <div class="form-group">
      <label class="form-label">Kitne % attendance chahiye?</label>
      <div class="btn-group" id="thresh-group">
        ${thresholds.map(t=>`<button class="btn-group-item ${threshSelected===t?'selected':''}" onclick="selectThreshold('${t}')">${t}</button>`).join('')}
      </div>
      <div id="custom-thresh-wrap" style="margin-top:10px;display:${threshSelected==='Custom'?'block':'none'}">
        <input class="input" type="number" id="ob-custom-thresh" min="1" max="100" placeholder="e.g. 70" value="${ob.profile.customThreshold||''}">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Condonation milti hai?</label>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="ob-condonation" ${ob.profile.condonation?'checked':''} onchange="toggleCondonation(this)">
          <span class="toggle-slider"></span>
        </label>
        <span style="font-size:14px;font-weight:600">${ob.profile.condonation?'Haan':'Nahi'}</span>
      </div>
      <div id="condonation-pts-wrap" style="margin-top:10px;display:${ob.profile.condonation?'block':'none'}">
        <input class="input" type="number" id="ob-condonation-pts" min="1" max="20" placeholder="Kitne % ki chhoot milti hai?" value="${ob.profile.condonationPts||''}">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Attendance kitni strictly enforce hoti hai?</label>
      <div class="btn-group">
        ${strictness.map(s=>`<button class="btn-group-item ${strictSelected===s?'selected':''}" onclick="selectStrictness('${s}')">${s}</button>`).join('')}
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">College kaise jaate ho? (multiple select)</label>
      <div class="btn-group">
        ${COMMUTES.map(c=>`<button class="btn-group-item ${commuteSelected.includes(c)?'selected':''}" onclick="toggleCommute('${c}')">${c}</button>`).join('')}
      </div>
    </div>

    <div style="margin-top:8px">
      <button class="btn btn-primary btn-full" onclick="step1Next()">Aage chalo</button>
    </div>
  `;
}

function selectStream(s) {
  ob.profile.stream = s;
  if (ob.profile.semester > (s==='Engineering'?8:6)) ob.profile.semester = null;
  renderStep1();
}
function selectSem(n) { ob.profile.semester = n; renderStep1(); }
function selectThreshold(t) {
  ob.profile.thresholdType = t;
  document.getElementById('custom-thresh-wrap').style.display = t==='Custom'?'block':'none';
  document.querySelectorAll('#thresh-group .btn-group-item').forEach(el=>el.classList.toggle('selected', el.textContent===t));
}
function selectStrictness(s) {
  ob.profile.strictness = s;
  document.querySelectorAll('#onboard-body .btn-group').forEach(grp=>{
    grp.querySelectorAll('.btn-group-item').forEach(el=>{
      if(['Strictly enforced','Moderate','Relaxed'].includes(el.textContent)) el.classList.toggle('selected', el.textContent===s);
    });
  });
  renderStep1();
}
function toggleCommute(c) {
  if (!ob.profile.commute) ob.profile.commute = [];
  const idx = ob.profile.commute.indexOf(c);
  if (idx>=0) ob.profile.commute.splice(idx,1); else ob.profile.commute.push(c);
  document.querySelectorAll('#onboard-body .btn-group').forEach(grp=>{
    grp.querySelectorAll('.btn-group-item').forEach(el=>{
      if(COMMUTES.includes(el.textContent)) el.classList.toggle('selected', ob.profile.commute.includes(el.textContent));
    });
  });
}
function toggleCondonation(el) {
  ob.profile.condonation = el.checked;
  document.getElementById('condonation-pts-wrap').style.display = el.checked?'block':'none';
  el.parentElement.nextElementSibling.textContent = el.checked?'Haan':'Nahi';
}

function step1Next() {
  ob.profile.name = document.getElementById('ob-name').value.trim();
  ob.profile.college = document.getElementById('ob-college').value.trim();
  ob.profile.city = document.getElementById('ob-city').value.trim();
  ob.profile.startDate = document.getElementById('ob-start').value;
  ob.profile.endDate = document.getElementById('ob-end').value;
  if (ob.profile.thresholdType === 'Custom') {
    ob.profile.customThreshold = document.getElementById('ob-custom-thresh').value;
  }
  if (ob.profile.condonation) {
    ob.profile.condonationPts = document.getElementById('ob-condonation-pts').value;
  }
  if (!ob.profile.name) { alert('Naam toh batao!'); return; }
  if (!ob.profile.startDate || !ob.profile.endDate) { alert('Semester dates daalo!'); return; }
  if (!ob.profile.thresholdType) { alert('Attendance threshold select karo!'); return; }
  if (ob.profile.thresholdType === 'Custom' && !ob.profile.customThreshold) { alert('Custom % daalo!'); return; }
  ob.step = 1;
  renderOnboarding();
}

function renderStep2() {
  let subjectsHtml = '';
  if (ob.subjects.length) {
    subjectsHtml = ob.subjects.map((s,i)=>`
      <div class="subject-row">
        <div class="subject-row-name">${s.name}</div>
        <div class="subject-row-meta">${s.days.map(d=>DAY_LABELS[d]).join(', ')} — ${s.lecturesPerWeek} lecture${s.lecturesPerWeek>1?'s':''}/week</div>
      </div>
    `).join('');
  }

  const addFormHtml = ob.subjects.length < 12 ? `
    <div class="subject-add-form">
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Subject ka naam</label>
        <input class="input" id="ob-sub-name" placeholder="e.g. Engineering Maths">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Kaunse din hote hain?</label>
        <div class="day-checks" id="ob-day-checks">
          ${['Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`
            <label class="day-check-label" id="dlbl-${d}">
              <input type="checkbox" value="${DAY_MAP[d]}" onchange="updateDayCheck(this,'${d}')"> ${d}
            </label>
          `).join('')}
        </div>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Kitne lectures per week?</label>
        <input class="input" type="number" id="ob-sub-lpw" min="1" max="6" placeholder="e.g. 3">
      </div>
      <button class="btn btn-secondary btn-full" onclick="addSubjectOb()">Subject add karo</button>
    </div>
  ` : '<p style="font-size:13px;color:var(--text-secondary);text-align:center;padding:12px">12 subjects ho gaye. Enough hai.</p>';

  document.getElementById('onboard-body').innerHTML = `
    <div class="onboard-step-title">Subjects add karo</div>
    <div class="onboard-step-sub">Ek ek karke. Baad mein bhi add kar sakte ho.</div>
    ${subjectsHtml}
    ${addFormHtml}
    ${ob.subjects.length > 0 ? `
      <div style="margin-top:20px">
        <button class="btn btn-primary btn-full" onclick="finishOnboarding()">Done. Dashboard dikhao.</button>
      </div>
    ` : ''}
  `;
}

function updateDayCheck(el, day) {
  const lbl = document.getElementById('dlbl-'+day);
  lbl.classList.toggle('checked', el.checked);
}

function addSubjectOb() {
  const name = document.getElementById('ob-sub-name').value.trim();
  const checks = document.querySelectorAll('#ob-day-checks input:checked');
  const days = Array.from(checks).map(c=>+c.value);
  const lpw = +document.getElementById('ob-sub-lpw').value;
  if (!name) { alert('Subject naam daalo!'); return; }
  if (!days.length) { alert('Koi din select nahi kiya!'); return; }
  if (!lpw || lpw < 1) { alert('Lectures per week daalo!'); return; }
  ob.subjects.push({ id: 'sub_'+Date.now()+'_'+Math.random().toString(36).slice(2), name, days, lecturesPerWeek: lpw });
  renderStep2();
}

function finishOnboarding() {
  if (!ob.subjects.length) { alert('Kam se kam ek subject toh add karo!'); return; }
  const t = ob.profile.thresholdType;
  const threshold = t==='75%'?75:t==='80%'?80:t==='85%'?85:+ob.profile.customThreshold;
  state.profile = {
    name: ob.profile.name,
    college: ob.profile.college,
    city: ob.profile.city,
    stream: ob.profile.stream,
    semester: ob.profile.semester,
    startDate: ob.profile.startDate,
    endDate: ob.profile.endDate,
    threshold,
    condonation: ob.profile.condonation||false,
    condonationPts: ob.profile.condonationPts||0,
    strictness: ob.profile.strictness,
    commute: ob.profile.commute||[],
    thresholdType: t
  };
  state.subjects = ob.subjects;
  saveState();
  launchApp();
}

// ═══════════════════════════════════════════════════
//  APP LAUNCH
// ═══════════════════════════════════════════════════
let currentView = 0;

function launchApp() {
  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
  setupMarquee();
  switchView(0);
}

function setupMarquee() {
  const msgs = ['Log karo. Chill karo.','Hum bas count karte hain.','Aaj kitne classes hain?'];
  const full = msgs.map(m=>`<span>${m}</span>`).join('') + msgs.map(m=>`<span>${m}</span>`).join('');
  document.getElementById('marquee-inner').innerHTML = full;
}

function switchView(n) {
  currentView = n;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  const vc = document.getElementById('view-container');
  vc.scrollTop = 0;
  if (n===0) renderDashboard();
  else if (n===1) renderSubjects();
  else if (n===2) renderCalendar();
  else if (n===3) renderPlanner();
  else if (n===4) renderSettings();
}

// ═══════════════════════════════════════════════════
//  VIEW 1: DASHBOARD
// ═══════════════════════════════════════════════════
function renderDashboard() {
  const vc = document.getElementById('view-container');
  const pct = getOverallPct();
  const pctColor = pct===null?'var(--text-secondary)':pct>=(state.profile?.threshold||75)?'var(--success)':pct>=(state.profile?.threshold||75)-10?'#C69A00':'var(--danger)';
  const roast = getSessionRoast();
  const todayClasses = getTodayClasses();
  const summary = getOverallSummary();
  const hour = new Date().getHours();
  const greeting = hour<12?'Subah ki salamat,':hour<17?'Dopahar ka namskar,':'Shaam ki shuruaat,';

  let todayHtml = '';
  if (!state.subjects.length) {
    todayHtml = `<div class="empty-state"><div class="empty-state-title">No subjects yet.</div>Add one, then we can talk.</div>`;
  } else if (!todayClasses.length) {
    todayHtml = `<div class="empty-state" style="padding:24px"><div class="empty-state-title">Aaj koi class nahi.</div>Enjoy the day. You earned it.</div>`;
  } else {
    todayHtml = todayClasses.map(s=>{
      const log = state.logs[today()]?.[s.id];
      const stats = getSubjectStats(s);
      return `
        <div class="today-card">
          <div class="today-card-header">
            <div class="today-card-name">${s.name}</div>
            <div class="today-card-pct" style="color:${stats.pct!==null?(stats.pct>=(state.profile?.threshold||75)?'var(--success)':stats.pct>=(state.profile?.threshold||75)-10?'#C69A00':'var(--danger)'):'var(--text-secondary)'}">${stats.pct!==null?stats.pct+'%':'—'}</div>
          </div>
          <div class="today-card-actions">
            <button class="log-btn ${log==='P'?'active-present':''}" onclick="logClass('${s.id}','P')">Present</button>
            <button class="log-btn ${log==='A'?'active-absent':''}" onclick="logClass('${s.id}','A')">Absent</button>
            <button class="log-btn ${log==='C'?'active-cancelled':''}" onclick="logClass('${s.id}','C')">Cancelled</button>
          </div>
        </div>
      `;
    }).join('');
  }

  vc.innerHTML = `
    <div class="dash-greeting">${greeting}<br><span class="dash-name">${state.profile?.name||'student'}.</span></div>
    <div class="dash-roast">${roast}</div>

      <div class="dash-pct-num" style="color:${pctColor}">${pct!==null?pct+'%':'—'}</div>
      <div class="dash-pct-label">Overall Attendance</div>
    </div>
    <div class="section-title">Aaj ke classes</div>

}

function getTodayClasses() {
  const dow = parseDate(today()).getDay();
  return state.subjects.filter(s=>s.days.includes(dow));
}

function logClass(subjectId, status) {
  if (!state.logs[today()]) state.logs[today()] = {};
  if (state.logs[today()][subjectId] === status) {
    delete state.logs[today()][subjectId];
  } else {
    state.logs[today()][subjectId] = status;
  }
  saveState();
  renderDashboard();
}

// ═══════════════════════════════════════════════════
//  VIEW 3: CALENDAR
// ═══════════════════════════════════════════════════
let calDate = new Date();

function renderCalendar() {
  const vc = document.getElementById('view-container');
  const streak = getStreak();
  const year = calDate.getFullYear(), month = calDate.getMonth();
  const monthLabel = calDate.toLocaleString('default',{month:'long', year:'numeric'});
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const todayStr = today();

  let cells = '';
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture = ds > todayStr;
    const isToday = ds === todayStr;
    const dow = parseDate(ds).getDay();
    const scheduledSubs = state.subjects.filter(s=>s.days.includes(dow));
    let cls='cal-cell';
    if(isFuture) cls+=' future';
    else if(!scheduledSubs.length) cls+=' no-classes';
    else {
      const logs = state.logs[ds]||{};
      const attended = scheduledSubs.filter(s=>logs[s.id]==='P').length;
      const cancelled = scheduledSubs.filter(s=>logs[s.id]==='C').length;
      const held = scheduledSubs.length - cancelled;
      const pct = held>0?attended/held:1;
      cls += pct>=0.75?' has-classes-good':pct>=0.5?' has-classes-warn':' has-classes-bad';
    }
    if(isToday) cls+=' today-cell';
    cells += `<div class="${cls}" onclick="openCalDay('${ds}')">${d}</div>`;
  }

  vc.innerHTML = `
    ${streak>0?`<div class="streak-banner"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>${streak} class streak. Don't blow it.</div>`:''}
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calNav(-1)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="cal-month-label">${monthLabel}</div>
      <button class="cal-nav-btn" onclick="calNav(1)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
    <div class="cal-grid-header">
      ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-label">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>
    <div id="cal-day-detail"></div>
  `;
}

function calNav(dir) {
  calDate = new Date(calDate.getFullYear(), calDate.getMonth()+dir, 1);
  renderCalendar();
}

function getStreak() {
  let streak = 0;
  const cur = new Date();
  cur.setDate(cur.getDate()-1);
  while(true) {
    const ds = fmtDate(cur);
    const dow = cur.getDay();
    const scheduled = state.subjects.filter(s=>s.days.includes(dow));
    if(!scheduled.length) { cur.setDate(cur.getDate()-1); if(streak>20) break; continue; }
    const logs = state.logs[ds]||{};
    const allPresent = scheduled.every(s=>logs[s.id]==='P'||logs[s.id]==='C');
    if(!allPresent) break;
    streak++;
    cur.setDate(cur.getDate()-1);
    if(streak>60) break;
  }
  return streak;
}

function openCalDay(ds) {
  const dow = parseDate(ds).getDay();
  const scheduled = state.subjects.filter(s=>s.days.includes(dow));
  const logs = state.logs[ds]||{};
  const isFuture = ds > today();
  const dateLabel = parseDate(ds).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});

  const subjectRows = scheduled.length ? scheduled.map(s=>{
    const log = logs[s.id];
    return `
      <div style="margin-bottom:14px">
        <div style="font-weight:700;font-size:15px;margin-bottom:8px">${s.name}</div>
        <div style="display:flex;gap:8px">
          <button class="edit-log-btn ${log==='P'?'sel-P':''}" onclick="editLog('${ds}','${s.id}','P')">Present</button>
          <button class="edit-log-btn ${log==='A'?'sel-A':''}" onclick="editLog('${ds}','${s.id}','A')">Absent</button>
          <button class="edit-log-btn ${log==='C'?'sel-C':''}" onclick="editLog('${ds}','${s.id}','C')">Cancelled</button>
          <button class="edit-log-btn ${!log?'sel-none':''}" onclick="editLog('${ds}','${s.id}',null)">Clear</button>
        </div>
      </div>
    `;
  }).join('') : '<p style="color:var(--text-secondary);font-size:14px">Is din koi class nahi thi.</p>';

  const content = document.getElementById('modal-cal-day-content');
  content.innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-title">${dateLabel}</div>
    ${isFuture?'<p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">Future date — log nahi kar sakte abhi.</p>':''}
    ${!isFuture?subjectRows:scheduled.map(s=>`<div style="padding:10px 0;border-bottom:1px solid var(--border);font-weight:600">${s.name}</div>`).join('')}
    <div style="margin-top:16px"><button class="btn btn-secondary btn-full" onclick="closeModal('modal-cal-day')">Close</button></div>
  `;
  document.getElementById('modal-cal-day').classList.add('open');
}

function editLog(ds, subjectId, status) {
  if (!state.logs[ds]) state.logs[ds] = {};
  if (status===null) delete state.logs[ds][subjectId];
  else state.logs[ds][subjectId] = status;
  saveState();
  openCalDay(ds);
  if(currentView===0) renderDashboard();
}

// ═══════════════════════════════════════════════════
//  VIEW 4: BUNK PLANNER
// ═══════════════════════════════════════════════════
function renderPlanner() {
  const vc = document.getElementById('view-container');
  const threshold = state.profile?.threshold || 75;
  const next7 = [];
  const cur = new Date();
  for(let i=0;i<7;i++){
    const d = new Date(cur);
    d.setDate(cur.getDate()+i);
    next7.push(fmtDate(d));
  }

  let html = `<div class="section-title">Bunk Planner</div>`;

  for(const ds of next7){
    const dow = parseDate(ds).getDay();
    const classes = state.subjects.filter(s=>s.days.includes(dow));
    if(!classes.length) continue;
    const dayLabel = parseDate(ds).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'});
    const skips = state.plannerSkips[ds]||[];

    const rows = classes.map(s=>{
      const stats = getSubjectStats(s);
      const isSkipping = skips.includes(s.id);
      // Calculate impact of skipping
      let tag, tagCls;
      if(isSkipping) { tag='Planning to skip'; tagCls='skip-planning'; }
      else if(stats.bunkBudget > 2) { tag='Safe'; tagCls='skip-safe'; }
      else if(stats.bunkBudget > 0) { tag='Risky'; tagCls='skip-risky'; }
      else { tag='Cannot skip'; tagCls='skip-no'; }

      // Impact if skipping this one more
      let impactStr = '';
      if(!isSkipping && stats.pct!==null) {
        const newPct = stats.held>0?Math.round((stats.attended/(stats.held+1))*100):0;
        const diff = newPct - (stats.pct||0);
        impactStr = `Skipping drops ${s.name} to ${newPct}% (${diff}%)`;
      }

      return `
        <div class="planner-class-row" onclick="togglePlannerSkip('${ds}','${s.id}')">
          <div>
            <div class="planner-class-name">${s.name}</div>
            <div class="planner-class-sub">${stats.pct!==null?stats.pct+'% now':'No data'} · Budget: ${stats.bunkBudget}</div>
          </div>
          <button class="skip-tag ${tagCls}" onclick="event.stopPropagation();togglePlannerSkip('${ds}','${s.id}')">${tag}</button>
        </div>
        ${impactStr?`<div class="impact-line">${impactStr}</div>`:''}
      `;
    }).join('');

    html += `
      <div class="planner-card">
        <div class="planner-day-header">${dayLabel}</div>
        ${rows}
      </div>
    `;
  }

  if(html === `<div class="section-title">Bunk Planner</div>`) {
    html += `<div class="empty-state"><div class="empty-state-title">Agle 7 din mein koi class nahi.</div>Lucky you.</div>`;
  }

  vc.innerHTML = html;
}

function togglePlannerSkip(ds, subjectId) {
  if(!state.plannerSkips[ds]) state.plannerSkips[ds]=[];
  const idx = state.plannerSkips[ds].indexOf(subjectId);
  if(idx>=0) state.plannerSkips[ds].splice(idx,1);
  else state.plannerSkips[ds].push(subjectId);
  saveState();
  renderPlanner();
}

function doAddSubject() {

  state.subjects.push({ id:'sub_'+Date.now(), name, days, lecturesPerWeek:lpw });

  closeModal('modal-add-subject');
  if(currentView===0) renderDashboard();
  else if(currentView===1) renderSubjects();
}
