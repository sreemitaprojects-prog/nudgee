<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>nudge. — Setup</title>
  <meta name="theme-color" content="#1A1F36">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── Onboarding-specific styles ── */
    body { background: var(--bg); }

    .ob-shell {
      max-width: var(--app-width);
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* sticky header */
    .ob-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 40px 24px 20px;
    }
    .ob-logo {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .ob-tagline {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 20px;
    }

    /* progress pills */
    .progress-bar {
      display: flex;
      gap: 6px;
    }
    .prog-seg {
      height: 4px;
      flex: 1;
      border-radius: 100px;
      background: var(--border);
      transition: background 0.35s;
    }
    .prog-seg.done { background: var(--primary); }

    /* body */
    .ob-body { padding: 28px 24px 48px; flex: 1; }

    .ob-step-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .ob-step-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 30px;
      font-weight: 500;
    }

    /* subject rows in step 2 */
    .subject-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .subject-row-name  { font-weight: 700; font-size: 15px; }
    .subject-row-meta  { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .subject-row-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .subject-row-del:hover { color: var(--danger); }

    /* add-subject form panel */
    .add-subject-panel {
      background: #F8FAFF;
      border: 1.5px dashed var(--secondary);
      border-radius: 14px;
      padding: 20px;
      margin-top: 12px;
    }
    .add-subject-panel.collapsed { display: none; }

    .panel-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px;
      border: 1.5px dashed var(--secondary);
      border-radius: 12px;
      background: #F8FAFF;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.15s;
    }
    .panel-toggle:hover { background: #EEF1FF; }

    /* bottom CTA */
    .ob-footer {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      padding: 16px 24px 28px;
    }

    /* error hint */
    .field-error {
      font-size: 12px;
      color: var(--danger);
      margin-top: 5px;
      font-weight: 600;
      display: none;
    }
    .field-error.show { display: block; }
  </style>
</head>
<body>
<div class="ob-shell" id="ob-shell">

  <!-- ── Header (sticky) ── -->
  <div class="ob-header">
    <div class="ob-logo">nudge.</div>
    <div class="ob-tagline">Log karo. Chill karo.</div>
    <div class="progress-bar">
      <div class="prog-seg" id="prog-0"></div>
      <div class="prog-seg" id="prog-1"></div>
    </div>
  </div>

  <!-- ── Body ── -->
  <div class="ob-body" id="ob-body"></div>

  <!-- ── Footer CTA ── -->
  <div class="ob-footer" id="ob-footer"></div>

</div>

<script src="shared.js"></script>
<script>
// ── If already onboarded, skip straight to dashboard ──
if (isOnboarded()) window.location.href = 'dashboard.html';

// ── State ──
const ob = {
  step: 0,
  profile: {},
  subjects: []   // { id, name, days[], lecturesPerWeek }
};

const STREAMS   = ['Engineering', 'Arts', 'Science', 'Commerce', 'Law', 'Medical'];
const COMMUTES  = ['Local train', 'College bus', 'City bus', 'Auto', 'Own vehicle', "Don't commute"];
const STRICTNESS= ['Strictly enforced', 'Moderate', 'Relaxed'];
const THRESH_OPTS = ['75%', '80%', '85%', 'Custom'];

// ── Render dispatcher ──
function render() {
  updateProgress();
  if (ob.step === 0) renderStep1();
  else               renderStep2();
}

function updateProgress() {
  document.getElementById('prog-0').classList.toggle('done', ob.step >= 0);
  document.getElementById('prog-1').classList.toggle('done', ob.step >= 1);
}

// ══════════════════════════════════
//  STEP 1
// ══════════════════════════════════
function renderStep1() {
  const p = ob.profile;
  const maxSem = p.stream === 'Engineering' ? 8 : 6;

  document.getElementById('ob-body').innerHTML = `
    <div class="ob-step-title">Pehle apne baare<br>mein batao.</div>
    <div class="ob-step-sub">Yeh sirf tumhare liye hai. Koi nahi dekhta.</div>

    <div class="form-group">
      <label class="form-label">Apna naam batao</label>
      <input class="input" id="f-name" placeholder="e.g. Ananya" value="${esc(p.name||'')}">
      <div class="field-error" id="err-name">Naam toh daalo!</div>
    </div>

    <div class="form-group">
      <label class="form-label">Kaunsa college?</label>
      <input class="input" id="f-college" placeholder="e.g. St. Xavier's College" value="${esc(p.college||'')}">
    </div>

    <div class="form-group">
      <label class="form-label">Kaunsa city?</label>
      <input class="input" id="f-city" placeholder="e.g. Mumbai" value="${esc(p.city||'')}">
    </div>

    <div class="form-group">
      <label class="form-label">Stream kya hai?</label>
      <div class="btn-group">
        ${STREAMS.map(s => `
          <button type="button" class="btn-group-item ${p.stream===s?'selected':''}"
            onclick="selectOne('stream','${s}',this.closest('.btn-group'))">${s}</button>
        `).join('')}
      </div>
      <div class="field-error" id="err-stream">Stream choose karo.</div>
    </div>

    <div class="form-group">
      <label class="form-label">Kaun sa semester?</label>
      <div class="btn-group">
        ${Array.from({length: maxSem}, (_,i)=>i+1).map(n=>`
          <button type="button" class="btn-group-item ${p.semester===n?'selected':''}"
            onclick="selectOnePrim('semester',${n},this.closest('.btn-group'))">${n}</button>
        `).join('')}
      </div>
      <div class="field-error" id="err-sem">Semester select karo.</div>
    </div>

    <div class="form-group">
      <label class="form-label">Semester kab shuru hua?</label>
      <input class="input" type="date" id="f-start" value="${p.startDate||''}">
      <div class="field-error" id="err-start">Start date daalo.</div>
    </div>

    <div class="form-group">
      <label class="form-label">Semester kab khatam hoga?</label>
      <input class="input" type="date" id="f-end" value="${p.endDate||''}">
      <div class="field-error" id="err-end">End date daalo.</div>
    </div>

    <div class="form-group">
      <label class="form-label">Kitne % attendance chahiye?</label>
      <div class="btn-group">
        ${THRESH_OPTS.map(t=>`
          <button type="button" class="btn-group-item ${p.threshType===t?'selected':''}"
            onclick="selectThresh('${t}',this.closest('.btn-group'))">${t}</button>
        `).join('')}
      </div>
      <div id="custom-thresh-wrap" style="margin-top:10px;${p.threshType==='Custom'?'':'display:none'}">
        <input class="input" type="number" id="f-custom-thresh" min="1" max="100"
          placeholder="Percentage daalo, e.g. 70" value="${p.customThresh||''}">
      </div>
      <div class="field-error" id="err-thresh">Threshold choose karo.</div>
    </div>

    <div class="form-group">
      <label class="form-label">Condonation milti hai?</label>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="f-condonation" ${p.condonation?'checked':''}
            onchange="toggleCondonation(this.checked)">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label" id="cond-label">${p.condonation?'Haan':'Nahi'}</span>
      </div>
      <div id="cond-pts-wrap" style="margin-top:12px;${p.condonation?'':'display:none'}">
        <input class="input" type="number" id="f-cond-pts" min="1" max="20"
          placeholder="Kitne % ki chhoot? e.g. 5" value="${p.condonationPts||''}">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Attendance kitni strictly enforce hoti hai?</label>
      <div class="btn-group">
        ${STRICTNESS.map(s=>`
          <button type="button" class="btn-group-item ${p.strictness===s?'selected':''}"
            onclick="selectOne('strictness','${s}',this.closest('.btn-group'))">${s}</button>
        `).join('')}
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">College kaise jaate ho? <span style="font-weight:400;text-transform:none;letter-spacing:0">(multiple ok)</span></label>
      <div class="btn-group">
        ${COMMUTES.map(c=>`
          <button type="button" class="btn-group-item ${(p.commute||[]).includes(c)?'selected':''}"
            onclick="toggleCommute('${c}',this)">${c}</button>
        `).join('')}
      </div>
    </div>
  `;

  document.getElementById('ob-footer').innerHTML = `
    <button class="btn btn-primary btn-full" onclick="step1Next()">Aage chalo &rarr;</button>
  `;
}

// ── Selection helpers for step 1 ──
function selectOne(key, val, group) {
  ob.profile[key] = val;
  group.querySelectorAll('.btn-group-item').forEach(b => b.classList.toggle('selected', b.textContent === val));
  // stream change: re-render because semester count changes
  if (key === 'stream') render();
}
function selectOnePrim(key, val, group) {
  ob.profile[key] = val;
  group.querySelectorAll('.btn-group-item').forEach(b => b.classList.toggle('selected', +b.textContent === val));
}
function selectThresh(t, group) {
  ob.profile.threshType = t;
  group.querySelectorAll('.btn-group-item').forEach(b => b.classList.toggle('selected', b.textContent === t));
  document.getElementById('custom-thresh-wrap').style.display = t === 'Custom' ? 'block' : 'none';
}
function toggleCommute(c, btn) {
  if (!ob.profile.commute) ob.profile.commute = [];
  const idx = ob.profile.commute.indexOf(c);
  if (idx >= 0) ob.profile.commute.splice(idx, 1);
  else ob.profile.commute.push(c);
  btn.classList.toggle('selected', ob.profile.commute.includes(c));
}
function toggleCondonation(checked) {
  ob.profile.condonation = checked;
  document.getElementById('cond-label').textContent = checked ? 'Haan' : 'Nahi';
  document.getElementById('cond-pts-wrap').style.display = checked ? 'block' : 'none';
}

// ── Step 1 validation & advance ──
function step1Next() {
  // read all fields
  ob.profile.name      = document.getElementById('f-name').value.trim();
  ob.profile.college   = document.getElementById('f-college').value.trim();
  ob.profile.city      = document.getElementById('f-city').value.trim();
  ob.profile.startDate = document.getElementById('f-start').value;
  ob.profile.endDate   = document.getElementById('f-end').value;
  if (ob.profile.threshType === 'Custom') {
    ob.profile.customThresh = document.getElementById('f-custom-thresh').value;
  }
  if (ob.profile.condonation) {
    ob.profile.condonationPts = document.getElementById('f-cond-pts').value;
  }

  let ok = true;
  function err(id, show) { document.getElementById(id).classList.toggle('show', show); if(show) ok=false; }

  err('err-name',   !ob.profile.name);
  err('err-stream', !ob.profile.stream);
  err('err-sem',    !ob.profile.semester);
  err('err-start',  !ob.profile.startDate);
  err('err-end',    !ob.profile.endDate);
  err('err-thresh', !ob.profile.threshType || (ob.profile.threshType==='Custom' && !ob.profile.customThresh));

  if (!ok) {
    document.querySelector('.field-error.show')?.scrollIntoView({behavior:'smooth', block:'center'});
    return;
  }
  if (ob.profile.startDate >= ob.profile.endDate) {
    err('err-end', true);
    document.getElementById('err-end').textContent = 'End date start se pehle nahi ho sakti.';
    return;
  }

  ob.step = 1;
  render();
  window.scrollTo(0, 0);
}

// ══════════════════════════════════
//  STEP 2
// ══════════════════════════════════
let addPanelOpen = false;

function renderStep2() {
  const subjectsHtml = ob.subjects.map((s, i) => `
    <div class="subject-row">
      <div>
        <div class="subject-row-name">${esc(s.name)}</div>
        <div class="subject-row-meta">
          ${s.days.map(d => DAY_LABELS_SHORT[d]).join(', ')}
          &nbsp;·&nbsp; ${s.lecturesPerWeek} lecture${s.lecturesPerWeek>1?'s':''}/week
        </div>
      </div>
      <button class="subject-row-del" onclick="removeSubject(${i})" title="Remove">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
  `).join('');

  const panelHtml = ob.subjects.length < 12 ? `
    ${addPanelOpen ? `
    <div class="add-subject-panel" id="add-panel">
      <div class="form-group">
        <label class="form-label">Subject ka naam</label>
        <input class="input" id="ap-name" placeholder="e.g. Engineering Maths">
        <div class="field-error" id="ap-err-name">Naam toh daalo!</div>
      </div>
      <div class="form-group">
        <label class="form-label">Kaunse din hote hain?</label>
        <div class="day-checks">
          ${['Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`
            <label class="day-check-label" id="ap-dlbl-${d}" onclick="toggleDay(this,'${d}')">
              <input type="checkbox" value="${DAY_MAP[d]}"> ${d}
            </label>
          `).join('')}
        </div>
        <div class="field-error" id="ap-err-days">Kam se kam ek din choose karo.</div>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">Lectures per week</label>
        <input class="input" type="number" id="ap-lpw" min="1" max="14" placeholder="e.g. 3">
        <div class="field-error" id="ap-err-lpw">Lectures per week daalo.</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="closeAddPanel()">Cancel</button>
        <button class="btn btn-primary btn-sm" style="flex:1" onclick="addSubject()">Subject add karo</button>
      </div>
    </div>
    ` : `
    <button class="panel-toggle" onclick="openAddPanel()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Subject add karo
    </button>
    `}
  ` : '<p style="font-size:13px;color:var(--text-secondary);text-align:center;padding:16px 0">12 subjects ho gaye. Enough hai.</p>';

  document.getElementById('ob-body').innerHTML = `
    <div class="ob-step-title">Subjects add karo.</div>
    <div class="ob-step-sub">Ek ek karke. Baad mein bhi add kar sakte ho settings mein.</div>
    ${subjectsHtml}
    ${panelHtml}
    <div style="height:16px"></div>
  `;

  document.getElementById('ob-footer').innerHTML = ob.subjects.length > 0 ? `
    <button class="btn btn-primary btn-full" onclick="finishOnboarding()">
      Done. Dashboard dikhao.
    </button>
    <p style="text-align:center;font-size:12px;color:var(--text-secondary);margin-top:8px">
      ${ob.subjects.length} subject${ob.subjects.length===1?'':'s'} added
    </p>
  ` : `
    <button class="btn btn-ghost btn-full" disabled style="opacity:0.4;cursor:default">
      Pehle ek subject add karo
    </button>
  `;
}

function openAddPanel()  { addPanelOpen = true;  renderStep2(); document.getElementById('add-panel')?.scrollIntoView({behavior:'smooth'}); }
function closeAddPanel() { addPanelOpen = false; renderStep2(); }

function toggleDay(label, day) {
  const cb = label.querySelector('input');
  cb.checked = !cb.checked;
  label.classList.toggle('checked', cb.checked);
}

function addSubject() {
  const name = document.getElementById('ap-name').value.trim();
  const checked = document.querySelectorAll('.day-check-label.checked input');
  const days = Array.from(checked).map(c => +c.value);
  const lpw  = +document.getElementById('ap-lpw').value;

  let ok = true;
  function apErr(id, show, msg='') {
    const el = document.getElementById(id);
    el.classList.toggle('show', show);
    if (msg) el.textContent = msg;
    if (show) ok = false;
  }
  apErr('ap-err-name', !name);
  apErr('ap-err-days', days.length === 0);
  apErr('ap-err-lpw',  !lpw || lpw < 1, lpw < 1 ? 'Kam se kam 1 lecture per week.' : '');
  if (!ok) return;

  ob.subjects.push({ id: uid(), name, days, lecturesPerWeek: lpw });
  addPanelOpen = false;
  renderStep2();
}

function removeSubject(i) {
  ob.subjects.splice(i, 1);
  renderStep2();
}

// ── Finish onboarding ──
function finishOnboarding() {
  if (!ob.subjects.length) return;

  const p = ob.profile;
  const threshMap = { '75%': 75, '80%': 80, '85%': 85 };
  const threshold = p.threshType === 'Custom' ? +p.customThresh : threshMap[p.threshType];

  const state = {
    profile: {
      name:          p.name,
      college:       p.college || '',
      city:          p.city || '',
      stream:        p.stream || '',
      semester:      p.semester || 1,
      startDate:     p.startDate,
      endDate:       p.endDate,
      threshold:     threshold,
      thresholdType: p.threshType,
      condonation:   p.condonation || false,
      condonationPts:+( p.condonationPts || 0),
      strictness:    p.strictness || '',
      commute:       p.commute || []
    },
    subjects:     ob.subjects,
    logs:         {},
    plannerSkips: {}
  };

  saveState(state);
  window.location.href = 'dashboard.html';
}

// ── Escape helper ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// ── Boot ──
render();
</script>
</body>
</html>
